name: Metrics
on:
  # Se ejecuta cada 24 horas
  schedule: [{cron: "0 0 * * *"}]
  # Permite ejecutarlo manualmente desde la pestaña "Actions"
  workflow_dispatch:
  # Se ejecuta cuando haces push al branch principal
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Configuración visual (modo oscuro para que coincida con tu estilo)
          config_timezone: America/Lima
          template: classic
          base: header, activity, community, repositories, metadata
          config_display: large
          output_action: commit
          commits_authoring: dhuamlu@gmail.com
          
          # Plugin de lenguajes
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_skipped: |
            dhuamanilu/programacion
            dhuamanilu/p-competitiva
            dhuamanilu/ps-proyecto-final
            dhuamanilu/Sistemas-operativos
            dhuamanilu/RatingsConHilos
            dhuamanilu/TO-Proyecto-Final
          plugin_languages_limit: 8
